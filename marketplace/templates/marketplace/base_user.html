{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UVA Sustainability Secondhand Store</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'marketplace/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'marketplace/css/user_base.css' %}">
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class ="container">
      <header class="title">
        <img class="logo" src="{% static 'marketplace/images/Marketplace_Logo.png' %}" />
        <h1 class="text">UVA Sustainability Secondhand Store</h1>
      </header>

      <div class="layout">
        <aside class ="navbar">
          <ul>
            <li><a href="{% url 'user_home' %}">Home</a></li>
            <li><a href="{% url 'notifications_list' %}"> Notifications</a></li>
            <li><a href="{% url 'my_listings' %}">My Listings</a></li>
            <li><a href="{% url 'my_chats' %}">My Chats</a></li>
            <li><a href="{% url 'user_profile' %}">My Profile</a></li>
            <li><a href="{% url 'account_logout' %}">Log Out</a></li>
          </ul>
        </aside>
        
        <main class="content">
          <div class="content-wrapper">{% block content %}{% endblock %}</div>
        </main>
      </div>
    </div>
  </body>
</html>
